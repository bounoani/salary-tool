<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給料計算ツール</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        .timeInput {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .timeInput input {
            width: 100px;
            padding: 10px;
            font-size: 16px;
        }

        #wage {
            width: 150px;
            padding: 10px;
            font-size: 16px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <h2>給料計算ツール</h2>

    <label>基本給（時給 円）</label>
    <input id="wage" type="number" step="1">

    <label>所定時間</label>
    <div class="timeInput">
        <input id="normal_h" type="number" placeholder="時間">
        <input id="normal_m" type="number" placeholder="分">
    </div>

    <label>残業</label>
    <div class="timeInput">
        <input id="ot_h" type="number" placeholder="時間">
        <input id="ot_m" type="number" placeholder="分">
    </div>

    <label>深夜所定</label>
    <div class="timeInput">
        <input id="night_h" type="number" placeholder="時間">
        <input id="night_m" type="number" placeholder="分">
    </div>

    <label>深夜残業</label>
    <div class="timeInput">
        <input id="nightot_h" type="number" placeholder="時間">
        <input id="nightot_m" type="number" placeholder="分">
    </div>

    <button onclick="calc()">計算</button>

    <div class="result" id="result"></div>

    <script>

        function getHour(h, m) {
            h = Number(h) || 0;
            m = Number(m) || 0;
            return h + m / 60;
        }

        function calc() {

            let wage = Number(document.getElementById("wage").value);

            let normal = getHour(
                document.getElementById("normal_h").value,
                document.getElementById("normal_m").value
            );

            let overtime = getHour(
                document.getElementById("ot_h").value,
                document.getElementById("ot_m").value
            );

            let night = getHour(
                document.getElementById("night_h").value,
                document.getElementById("night_m").value
            );

            let nightot = getHour(
                document.getElementById("nightot_h").value,
                document.getElementById("nightot_m").value
            );

            let base = wage * normal;
            let overtimePay = wage * 1.25 * overtime;
            let nightPay = wage * 1.25 * night;
            let nightOtPay = wage * 1.50 * nightot;

            let total = base + overtimePay + nightPay + nightOtPay;

            document.getElementById("result").innerHTML =
                "基本給: " + Math.round(base).toLocaleString() + " 円<br>" +
                "残業手当: " + Math.round(overtimePay).toLocaleString() + " 円<br>" +
                "深夜手当: " + Math.round(nightPay).toLocaleString() + " 円<br>" +
                "深夜残業: " + Math.round(nightOtPay).toLocaleString() + " 円<br><hr>" +
                "<b>合計: " + Math.round(total).toLocaleString() + " 円</b>";
        }

    </script>

</body>

</html>
