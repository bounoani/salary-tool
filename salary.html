<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給料計算ツール</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2>給料計算ツール</h2>

    <label>基本給（時給 円）</label>
    <input id="wage" type="number" step="1">

    <label>所定時間（例 14:25）</label>
    <input id="normal" type="text" placeholder="14:25">

    <label>残業時間（例 02:30）</label>
    <input id="overtime" type="text" placeholder="02:30">

    <label>深夜所定（例 01:15）</label>
    <input id="night" type="text" placeholder="01:15">

    <label>深夜残業（例 00:45）</label>
    <input id="night_ot" type="text" placeholder="00:45">

    <button onclick="calc()">計算</button>

    <div class="result" id="result"></div>

    <script>

        function timeToHour(str) {

            if (!str) return 0

            let parts = str.split(":")

            let h = Number(parts[0])
            let m = Number(parts[1])

            return h + m / 60

        }

        function calc() {

            let wage = Number(document.getElementById("wage").value)

            let normal = timeToHour(document.getElementById("normal").value)
            let overtime = timeToHour(document.getElementById("overtime").value)
            let night = timeToHour(document.getElementById("night").value)
            let night_ot = timeToHour(document.getElementById("night_ot").value)

            let base = wage * normal

            let overtimePay = wage * 1.25 * overtime

            let nightPay = wage * 1.25 * night

            let nightOtPay = wage * 1.50 * night_ot

            let total = base + overtimePay + nightPay + nightOtPay

            document.getElementById("result").innerHTML = `
基本給: ${Math.round(base).toLocaleString()} 円<br>
残業手当: ${Math.round(overtimePay).toLocaleString()} 円<br>
深夜手当: ${Math.round(nightPay).toLocaleString()} 円<br>
深夜残業手当: ${Math.round(nightOtPay).toLocaleString()} 円<br>
<hr>
<b>合計: ${Math.round(total).toLocaleString()} 円</b>
`

        }

    </script>

</body>

</html>
