<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>給料計算ツール</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2>給料計算ツール</h2>

    <label>時給 (円)</label>
    <input id="wage" type="number" value="1000">

    <label>所定労働時間</label>
    <input id="normal" type="number">

    <label>残業時間（月60h以内）</label>
    <input id="ot25" type="number">

    <label>残業時間（月60h超）</label>
    <input id="ot50" type="number">

    <label>深夜所定労働</label>
    <input id="night" type="number">

    <label>深夜残業</label>
    <input id="night_ot" type="number">

    <label>法定休日労働</label>
    <input id="holiday" type="number">

    <button onclick="calc()">給料計算</button>

    <div class="result" id="result"></div>

    <script>

        function calc() {

            let wage = Number(document.getElementById("wage").value);

            let normal = Number(document.getElementById("normal").value);
            let ot25 = Number(document.getElementById("ot25").value);
            let ot50 = Number(document.getElementById("ot50").value);
            let night = Number(document.getElementById("night").value);
            let night_ot = Number(document.getElementById("night_ot").value);
            let holiday = Number(document.getElementById("holiday").value);

            let base = wage * normal;

            let overtime25 = wage * 1.25 * ot25;
            let overtime50 = wage * 1.50 * ot50;

            let night_pay = wage * 1.25 * night;

            let night_ot_pay = wage * 1.50 * night_ot;

            let holiday_pay = wage * 1.35 * holiday;

            let total = base + overtime25 + overtime50 + night_pay + night_ot_pay + holiday_pay;

            document.getElementById("result").innerHTML = `
基本給: ${base.toLocaleString()} 円<br>
残業手当: ${(overtime25 + overtime50).toLocaleString()} 円<br>
深夜手当: ${(night_pay + night_ot_pay).toLocaleString()} 円<br>
休日手当: ${holiday_pay.toLocaleString()} 円<br>
<hr>
<b>合計支給額: ${total.toLocaleString()} 円</b>
`;

        }

    </script>

</body>

</html>
