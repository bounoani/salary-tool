<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給料自動計算ツール made by S.KATO</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        .timeInput {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .timeInput input {
            width: 90px;
            padding: 10px;
            font-size: 16px;
        }

        #wage {
            width: 150px;
            padding: 10px;
            font-size: 16px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <h2>給料自動計算ツール made by S.KATO</h2>

    <h3>オフィスステーション勤怠の労働時間を入力して自動計算</h3>

    <label>基本給（時給 円）</label>
    <input id="wage" type="text" inputmode="numeric" pattern="[0-9]*">

    <label>所定時間</label>
    <div class="timeInput">
        <input id="normal_h" type="text" placeholder="時間" inputmode="numeric" pattern="[0-9]*">
        <input id="normal_m" type="text" placeholder="分" inputmode="numeric" pattern="[0-9]*">
    </div>

    <label>残業</label>
    <div class="timeInput">
        <input id="ot_h" type="text" placeholder="時間" inputmode="numeric" pattern="[0-9]*">
        <input id="ot_m" type="text" placeholder="分" inputmode="numeric" pattern="[0-9]*">
    </div>

    <label>深夜所定</label>
    <div class="timeInput">
        <input id="night_h" type="text" placeholder="時間" inputmode="numeric" pattern="[0-9]*">
        <input id="night_m" type="text" placeholder="分" inputmode="numeric" pattern="[0-9]*">
    </div>

    <label>深夜残業</label>
    <div class="timeInput">
        <input id="nightot_h" type="text" placeholder="時間" inputmode="numeric" pattern="[0-9]*">
        <input id="nightot_m" type="text" placeholder="分" inputmode="numeric" pattern="[0-9]*">
    </div>

    <button onclick="calc()">自動計算</button>

    <div class="result" id="result"></div>

    <script>

        const inputs = document.querySelectorAll("input")

        inputs.forEach((el, index) => {

            //半角数字のみ
            el.addEventListener("input", () => {
                el.value = el.value.replace(/[^0-9]/g, "")
            })

            //Enterで計算
            el.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    calc()
                }
            })

            //自動保存
            el.addEventListener("input", saveData)

        })

        function limitMinute(id) {

            let v = Number(document.getElementById(id).value)

            if (v > 59) {
                document.getElementById(id).value = 59
            }

        }

        function getHour(h, m) {

            h = Number(h) || 0
            m = Number(m) || 0

            return h + m / 60

        }

        function calc() {

            limitMinute("normal_m")
            limitMinute("ot_m")
            limitMinute("night_m")
            limitMinute("nightot_m")

            let wage = Number(document.getElementById("wage").value)

            let normal = getHour(
                document.getElementById("normal_h").value,
                document.getElementById("normal_m").value
            )

            let overtime = getHour(
                document.getElementById("ot_h").value,
                document.getElementById("ot_m").value
            )

            let night = getHour(
                document.getElementById("night_h").value,
                document.getElementById("night_m").value
            )

            let nightot = getHour(
                document.getElementById("nightot_h").value,
                document.getElementById("nightot_m").value
            )

            let base = wage * normal
            let overtimePay = wage * 1.25 * overtime
            let nightPay = wage * 1.25 * night
            let nightOtPay = wage * 1.50 * nightot

            let total = base + overtimePay + nightPay + nightOtPay

            document.getElementById("result").innerHTML =
                "基本給: " + Math.round(base).toLocaleString() + " 円<br>" +
                "残業手当: " + Math.round(overtimePay).toLocaleString() + " 円<br>" +
                "深夜手当: " + Math.round(nightPay).toLocaleString() + " 円<br>" +
                "深夜残業: " + Math.round(nightOtPay).toLocaleString() + " 円<br><hr>" +
                "<b>合計: " + Math.round(total).toLocaleString() + " 円</b><br>" +
                "（注意）誤差を含む可能性があるので注意";

            saveData()

        }

        function saveData() {

            let data = {}

            inputs.forEach(el => {
                data[el.id] = el.value
            })

            localStorage.setItem("salaryData", JSON.stringify(data))

        }

        function loadData() {

            let data = localStorage.getItem("salaryData")

            if (!data) return

            data = JSON.parse(data)

            inputs.forEach(el => {
                if (data[el.id]) {
                    el.value = data[el.id]
                }
            })

        }

        loadData()

    </script>

</body>

</html>
